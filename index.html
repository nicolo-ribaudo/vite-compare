<!doctype html>

    <main id="app">
      <header id="top">
        <h1>Vite bundle compare</h1>
        <p class="lede">
          Drop one <code>bundle-stats.json</code> per side, generated by the
          included Vite plugin (<code>plugins/vite-plugin-bundle-stats.ts</code>).
          No Vite config changes needed — drop the plugin in and rebuild.
        </p>
      </header>

      <section class="uploaders">
        <div class="uploader" data-side="a">
          <label>
            <span class="uploader-title">Side A</span>
            <span class="uploader-hint">Click or drop bundle-stats.json</span>
            <input type="file" accept="application/json,.json" hidden />
          </label>
          <div class="uploader-status" data-status></div>
        </div>
        <div class="uploader" data-side="b">
          <label>
            <span class="uploader-title">Side B</span>
            <span class="uploader-hint">Click or drop bundle-stats.json</span>
            <input type="file" accept="application/json,.json" hidden />
          </label>
          <div class="uploader-status" data-status></div>
        </div>
      </section>

      <section id="entry-analysis" hidden></section>
      <section id="results" hidden></section>
      <section id="module-diff" hidden></section>
      <section id="graph-section" hidden></section>
    </main>
